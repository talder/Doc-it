      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <!-- Document shape -->
  <path d="M168 112h112l64 64v224a16 16 0 01-16 16H168a16 16 0 01-16-16V128a16 16 0 0116-16z" fill="white" opacity="0.95"/>
