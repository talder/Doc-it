  <path d="M280 112l64 64h-48a16 16 0 01-16-16z" fill="white" opacity="0.7"/>
  <!-- Text lines on document -->
  <rect x="192" y="208" width="120" height="10" rx="5" fill="#3b82f6" opacity="0.35"/>
  <rect x="192" y="236" width="96" height="10" rx="5" fill="#3b82f6" opacity="0.25"/>
  <rect x="192" y="264" width="108" height="10" rx="5" fill="#3b82f6" opacity="0.35"/>
  <rect x="192" y="292" width="72" height="10" rx="5" fill="#3b82f6" opacity="0.25"/>
  <!-- Pencil overlay (bottom-right) -->
